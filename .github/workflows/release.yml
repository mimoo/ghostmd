name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create .app bundle
        run: |
          APP="GhostMD.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "target/${{ matrix.target }}/release/ghostmd" "$APP/Contents/MacOS/"
          cp scripts/Info.plist "$APP/Contents/Info.plist" 2>/dev/null || true
          # Generate Info.plist inline if not present
          if [ ! -f "$APP/Contents/Info.plist" ]; then
            cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>GhostMD</string>
              <key>CFBundleIdentifier</key><string>com.ghostmd.app</string>
              <key>CFBundleVersion</key><string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleExecutable</key><string>ghostmd</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          fi
          [ -f assets/AppIcon.icns ] && cp assets/AppIcon.icns "$APP/Contents/Resources/"
          tar czf "GhostMD-${{ matrix.target }}.tar.gz" "$APP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostMD-${{ matrix.target }}
          path: GhostMD-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: GhostMD-*.tar.gz
          generate_release_notes: true
